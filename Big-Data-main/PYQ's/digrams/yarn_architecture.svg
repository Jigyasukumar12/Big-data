<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">YARN Architecture</text>

  <defs>
    <marker id="ya" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="290" y="45" width="120" height="45" fill="#1e40af" rx="6"/>
  <text x="350" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client</text>

  <!-- Arrow Client → Resource Manager -->
  <line x1="350" y1="90" x2="350" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#ya)"/>
  <text x="370" y="108" font-size="9" fill="#64748b">submit job</text>

  <!-- Resource Manager -->
  <rect x="150" y="120" width="400" height="80" fill="#b45309" rx="8"/>
  <text x="350" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Resource Manager (Master)</text>
  <!-- Inner boxes -->
  <rect x="170" y="152" width="155" height="36" fill="#92400e" rx="5"/>
  <text x="247" y="168" text-anchor="middle" font-size="10" fill="#fde68a">Scheduler</text>
  <text x="247" y="182" text-anchor="middle" font-size="9" fill="#fde68a">Fair / Capacity / FIFO</text>
  <rect x="375" y="152" width="155" height="36" fill="#92400e" rx="5"/>
  <text x="452" y="168" text-anchor="middle" font-size="10" fill="#fde68a">Applications Manager</text>
  <text x="452" y="182" text-anchor="middle" font-size="9" fill="#fde68a">Manages app lifecycle</text>

  <!-- Arrows down to nodes -->
  <line x1="220" y1="200" x2="130" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#ya)"/>
  <line x1="350" y1="200" x2="350" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#ya)"/>
  <line x1="480" y1="200" x2="570" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#ya)"/>

  <!-- Node 1 -->
  <rect x="40" y="240" width="180" height="110" fill="#059669" rx="8"/>
  <text x="130" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Node Manager 1</text>
  <rect x="55" y="268" width="75" height="32" fill="#065f46" rx="4"/>
  <text x="92" y="280" text-anchor="middle" font-size="9" fill="#a7f3d0">App Master</text>
  <text x="92" y="293" text-anchor="middle" font-size="8" fill="#6ee7b7">(Container)</text>
  <rect x="140" y="268" width="65" height="32" fill="#065f46" rx="4"/>
  <text x="172" y="280" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <text x="172" y="293" text-anchor="middle" font-size="8" fill="#6ee7b7">(Task)</text>
  <rect x="55" y="308" width="65" height="32" fill="#065f46" rx="4"/>
  <text x="87" y="327" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <rect x="130" y="308" width="75" height="32" fill="#065f46" rx="4"/>
  <text x="167" y="327" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>

  <!-- Node 2 -->
  <rect x="260" y="240" width="180" height="110" fill="#059669" rx="8"/>
  <text x="350" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Node Manager 2</text>
  <rect x="275" y="268" width="65" height="32" fill="#065f46" rx="4"/>
  <text x="307" y="287" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <rect x="355" y="268" width="70" height="32" fill="#065f46" rx="4"/>
  <text x="390" y="287" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <rect x="275" y="308" width="150" height="32" fill="#065f46" rx="4"/>
  <text x="350" y="327" text-anchor="middle" font-size="9" fill="#a7f3d0">Container (Task)</text>

  <!-- Node 3 -->
  <rect x="480" y="240" width="180" height="110" fill="#059669" rx="8"/>
  <text x="570" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Node Manager 3</text>
  <rect x="495" y="268" width="65" height="32" fill="#065f46" rx="4"/>
  <text x="527" y="287" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <rect x="575" y="268" width="70" height="32" fill="#065f46" rx="4"/>
  <text x="610" y="287" text-anchor="middle" font-size="9" fill="#a7f3d0">Container</text>
  <rect x="495" y="308" width="150" height="32" fill="#065f46" rx="4"/>
  <text x="570" y="327" text-anchor="middle" font-size="9" fill="#a7f3d0">Container (Task)</text>

  <!-- Bottom note -->
  <rect x="20" y="368" width="660" height="24" fill="#e2e8f0" rx="5"/>
  <text x="350" y="383" text-anchor="middle" font-size="10" fill="#475569">Container = unit of resource allocation (CPU + RAM). NodeManager reports heartbeat to ResourceManager.</text>
</svg>
