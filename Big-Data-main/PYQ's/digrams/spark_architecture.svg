<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Apache Spark Architecture</text>

  <defs>
    <marker id="sa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Spark Components Row (top) -->
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Spark Libraries / APIs</text>
  <rect x="20" y="58" width="110" height="38" fill="#1e40af" rx="5"/>
  <text x="75" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Spark SQL</text>
  <text x="75" y="90" text-anchor="middle" font-size="9" fill="#bfdbfe">Structured data</text>
  <rect x="140" y="58" width="110" height="38" fill="#059669" rx="5"/>
  <text x="195" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Spark Streaming</text>
  <text x="195" y="90" text-anchor="middle" font-size="9" fill="#d1fae5">Real-time data</text>
  <rect x="260" y="58" width="110" height="38" fill="#7c3aed" rx="5"/>
  <text x="315" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="white">MLlib</text>
  <text x="315" y="90" text-anchor="middle" font-size="9" fill="#ddd6fe">Machine Learning</text>
  <rect x="380" y="58" width="110" height="38" fill="#b45309" rx="5"/>
  <text x="435" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="white">GraphX</text>
  <text x="435" y="90" text-anchor="middle" font-size="9" fill="#fde68a">Graph processing</text>
  <rect x="500" y="58" width="100" height="38" fill="#dc2626" rx="5"/>
  <text x="550" y="77" text-anchor="middle" font-size="10" font-weight="bold" fill="white">SparkR</text>
  <text x="550" y="90" text-anchor="middle" font-size="9" fill="#fecaca">R language API</text>

  <!-- Arrow down -->
  <line x1="350" y1="96" x2="350" y2="116" stroke="#475569" stroke-width="1.5" marker-end="url(#sa)"/>

  <!-- Spark Core -->
  <rect x="80" y="118" width="540" height="50" fill="#1e293b" rx="8"/>
  <text x="350" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Spark Core</text>
  <text x="350" y="158" text-anchor="middle" font-size="10" fill="#94a3b8">RDD API | Task Scheduling | Memory Management | Fault Recovery | I/O</text>

  <!-- Arrow -->
  <line x1="350" y1="168" x2="350" y2="188" stroke="#475569" stroke-width="1.5" marker-end="url(#sa)"/>

  <!-- Driver Box -->
  <rect x="200" y="190" width="300" height="70" fill="#7c3aed" rx="8"/>
  <text x="350" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Driver Program</text>
  <text x="350" y="232" text-anchor="middle" font-size="10" fill="#ddd6fe">SparkContext | DAGScheduler | TaskScheduler</text>
  <text x="350" y="250" text-anchor="middle" font-size="9" fill="#c4b5fd">Converts user code to Tasks, distributes to Executors</text>

  <!-- Arrows from Driver to Executors -->
  <line x1="250" y1="260" x2="130" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#sa)"/>
  <line x1="350" y1="260" x2="350" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#sa)"/>
  <line x1="450" y1="260" x2="570" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#sa)"/>

  <!-- Executor 1 -->
  <rect x="30" y="297" width="190" height="70" fill="#059669" rx="8"/>
  <text x="125" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Executor (Node 1)</text>
  <rect x="42" y="324" width="75" height="28" fill="#065f46" rx="4"/>
  <text x="79" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Cache</text>
  <rect x="128" y="324" width="80" height="28" fill="#065f46" rx="4"/>
  <text x="168" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Thread</text>
  <text x="125" y="360" text-anchor="middle" font-size="9" fill="#6ee7b7">In-Memory RDD partitions</text>

  <!-- Executor 2 -->
  <rect x="255" y="297" width="190" height="70" fill="#059669" rx="8"/>
  <text x="350" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Executor (Node 2)</text>
  <rect x="267" y="324" width="75" height="28" fill="#065f46" rx="4"/>
  <text x="304" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Cache</text>
  <rect x="353" y="324" width="80" height="28" fill="#065f46" rx="4"/>
  <text x="393" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Thread</text>
  <text x="350" y="360" text-anchor="middle" font-size="9" fill="#6ee7b7">In-Memory RDD partitions</text>

  <!-- Executor 3 -->
  <rect x="480" y="297" width="190" height="70" fill="#059669" rx="8"/>
  <text x="575" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Executor (Node 3)</text>
  <rect x="492" y="324" width="75" height="28" fill="#065f46" rx="4"/>
  <text x="529" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Cache</text>
  <rect x="578" y="324" width="80" height="28" fill="#065f46" rx="4"/>
  <text x="618" y="340" text-anchor="middle" font-size="9" fill="#a7f3d0">Task Thread</text>
  <text x="575" y="360" text-anchor="middle" font-size="9" fill="#6ee7b7">In-Memory RDD partitions</text>

  <!-- Cluster manager note -->
  <rect x="20" y="378" width="660" height="20" fill="#e2e8f0" rx="4"/>
  <text x="350" y="392" text-anchor="middle" font-size="10" fill="#475569">Cluster Manager: Standalone | YARN | Mesos | Kubernetes — allocates resources to Driver and Executors</text>
</svg>
