<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Apache Pig — Architecture &amp; Execution</text>

  <defs>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Pig Latin Script -->
  <rect x="270" y="50" width="160" height="44" fill="#1e40af" rx="6"/>
  <text x="350" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Pig Latin Script</text>
  <text x="350" y="87" text-anchor="middle" font-size="10" fill="#bfdbfe">User writes pig queries</text>

  <!-- Arrow down -->
  <line x1="350" y1="94" x2="350" y2="114" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Parser -->
  <rect x="270" y="116" width="160" height="38" fill="#7c3aed" rx="6"/>
  <text x="350" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Parser</text>
  <text x="350" y="148" text-anchor="middle" font-size="9" fill="#ddd6fe">Checks syntax, creates DAG</text>

  <!-- Arrow -->
  <line x1="350" y1="154" x2="350" y2="174" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Optimizer -->
  <rect x="270" y="176" width="160" height="38" fill="#b45309" rx="6"/>
  <text x="350" y="194" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Optimizer</text>
  <text x="350" y="210" text-anchor="middle" font-size="9" fill="#fde68a">Logical plan optimization</text>

  <!-- Arrow -->
  <line x1="350" y1="214" x2="350" y2="234" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Compiler -->
  <rect x="270" y="236" width="160" height="38" fill="#059669" rx="6"/>
  <text x="350" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Compiler</text>
  <text x="350" y="270" text-anchor="middle" font-size="9" fill="#a7f3d0">Converts to MapReduce jobs</text>

  <!-- Arrow branches -->
  <line x1="270" y1="255" x2="168" y2="275" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>
  <line x1="430" y1="255" x2="528" y2="275" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Local Mode -->
  <rect x="50" y="277" width="170" height="55" fill="#1e40af" rx="8"/>
  <text x="135" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Local Mode</text>
  <text x="135" y="313" text-anchor="middle" font-size="9" fill="#bfdbfe">Runs on single JVM</text>
  <text x="135" y="328" text-anchor="middle" font-size="9" fill="#bfdbfe">No Hadoop needed (testing)</text>

  <!-- MapReduce Mode -->
  <rect x="480" y="277" width="175" height="55" fill="#dc2626" rx="8"/>
  <text x="567" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MapReduce Mode</text>
  <text x="567" y="313" text-anchor="middle" font-size="9" fill="#fecaca">Runs on Hadoop cluster</text>
  <text x="567" y="328" text-anchor="middle" font-size="9" fill="#fecaca">Production scale processing</text>

  <!-- Grunt shell box -->
  <rect x="30" y="50" width="160" height="55" fill="#475569" rx="8"/>
  <text x="110" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Grunt Shell</text>
  <text x="110" y="88" text-anchor="middle" font-size="9" fill="#d1d5db">Interactive Pig interpreter</text>
  <text x="110" y="103" text-anchor="middle" font-size="9" fill="#d1d5db">pig> LOAD, DUMP, etc.</text>

  <!-- UDF box -->
  <rect x="520" y="50" width="160" height="55" fill="#475569" rx="8"/>
  <text x="600" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="white">UDF (Java)</text>
  <text x="600" y="88" text-anchor="middle" font-size="9" fill="#d1d5db">User Defined Functions</text>
  <text x="600" y="103" text-anchor="middle" font-size="9" fill="#d1d5db">Custom operations in Java</text>

  <!-- Note at bottom -->
  <rect x="20" y="348" width="660" height="24" fill="#e2e8f0" rx="5"/>
  <text x="350" y="364" text-anchor="middle" font-size="10" fill="#475569">Pig Latin → Parser → Logical Plan → Optimizer → Physical Plan → MapReduce Jobs → HDFS Output</text>
</svg>
