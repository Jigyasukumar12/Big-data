<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="420" fill="#f8fafc" rx="12"/>
  <text x="350" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">The 5 Vs of Big Data</text>

  <!-- Center Circle -->
  <circle cx="350" cy="220" r="60" fill="#1e40af" opacity="0.9"/>
  <text x="350" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="white">BIG</text>
  <text x="350" y="234" text-anchor="middle" font-size="15" font-weight="bold" fill="white">DATA</text>

  <!-- Volume -->
  <circle cx="350" cy="90" r="52" fill="#2563eb"/>
  <text x="350" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Volume</text>
  <text x="350" y="103" text-anchor="middle" font-size="10" fill="#bfdbfe">Scale of data</text>
  <line x1="350" y1="142" x2="350" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Velocity -->
  <circle cx="175" cy="155" r="52" fill="#7c3aed"/>
  <text x="175" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Velocity</text>
  <text x="175" y="168" text-anchor="middle" font-size="10" fill="#ddd6fe">Speed of data</text>
  <line x1="224" y1="178" x2="244" y2="193" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Variety -->
  <circle cx="175" cy="285" r="52" fill="#059669"/>
  <text x="175" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Variety</text>
  <text x="175" y="298" text-anchor="middle" font-size="10" fill="#a7f3d0">Types of data</text>
  <line x1="224" y1="264" x2="244" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Veracity -->
  <circle cx="525" cy="155" r="52" fill="#b45309"/>
  <text x="525" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Veracity</text>
  <text x="525" y="168" text-anchor="middle" font-size="10" fill="#fde68a">Quality of data</text>
  <line x1="476" y1="178" x2="456" y2="193" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Value -->
  <circle cx="525" cy="285" r="52" fill="#dc2626"/>
  <text x="525" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Value</text>
  <text x="525" y="298" text-anchor="middle" font-size="10" fill="#fecaca">Worth of data</text>
  <line x1="476" y1="264" x2="456" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Legend / examples at bottom -->
  <rect x="30" y="358" width="640" height="50" fill="#e2e8f0" rx="8"/>
  <text x="40" y="378" font-size="10" fill="#475569">Volume: Terabytes to Zettabytes</text>
  <text x="40" y="395" font-size="10" fill="#475569">Velocity: Real-time streaming, social media</text>
  <text x="195" y="378" font-size="10" fill="#475569">Variety: Text, images, video, sensor data</text>
  <text x="195" y="395" font-size="10" fill="#475569">Veracity: Accuracy, trustworthiness</text>
  <text x="420" y="387" font-size="10" fill="#475569">Value: Insights, business decisions</text>
</svg>
