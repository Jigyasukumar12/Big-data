<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="360" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">HDFS Block Replication (Factor = 3)</text>

  <defs>
    <marker id="br" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- File -->
  <rect x="10" y="60" width="120" height="80" fill="#1e40af" rx="8"/>
  <text x="70" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Large File</text>
  <text x="70" y="108" text-anchor="middle" font-size="10" fill="#bfdbfe">300 MB</text>
  <text x="70" y="124" text-anchor="middle" font-size="10" fill="#bfdbfe">Split into blocks</text>

  <!-- Arrows to blocks -->
  <line x1="130" y1="100" x2="168" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#br)"/>

  <!-- Block boxes -->
  <rect x="170" y="60" width="90" height="40" fill="#7c3aed" rx="5"/>
  <text x="215" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Block 1 (128MB)</text>
  <rect x="170" y="110" width="90" height="40" fill="#7c3aed" rx="5"/>
  <text x="215" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Block 2 (128MB)</text>
  <rect x="170" y="160" width="90" height="40" fill="#7c3aed" rx="5"/>
  <text x="215" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Block 3 (44MB)</text>

  <!-- Rack 1 -->
  <rect x="310" y="40" width="160" height="160" fill="#f0fdf4" rx="8" stroke="#059669" stroke-width="2"/>
  <text x="390" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">Rack 1</text>

  <rect x="325" y="68" width="130" height="38" fill="#059669" rx="5"/>
  <text x="390" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 1</text>
  <text x="390" y="98" text-anchor="middle" font-size="9" fill="#d1fae5">B1(copy1), B2(copy1)</text>

  <rect x="325" y="115" width="130" height="38" fill="#059669" rx="5"/>
  <text x="390" y="129" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 2</text>
  <text x="390" y="145" text-anchor="middle" font-size="9" fill="#d1fae5">B2(copy2), B3(copy1)</text>

  <rect x="325" y="162" width="130" height="30" fill="#059669" rx="5"/>
  <text x="390" y="181" text-anchor="middle" font-size="9" fill="#d1fae5">(same rack)</text>

  <!-- Rack 2 -->
  <rect x="510" y="40" width="170" height="160" fill="#fff7ed" rx="8" stroke="#b45309" stroke-width="2"/>
  <text x="595" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Rack 2</text>

  <rect x="525" y="68" width="140" height="38" fill="#b45309" rx="5"/>
  <text x="595" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 3</text>
  <text x="595" y="98" text-anchor="middle" font-size="9" fill="#fde68a">B1(copy2), B3(copy2)</text>

  <rect x="525" y="115" width="140" height="38" fill="#b45309" rx="5"/>
  <text x="595" y="129" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 4</text>
  <text x="595" y="145" text-anchor="middle" font-size="9" fill="#fde68a">B1(copy3), B2(copy3)</text>

  <rect x="525" y="162" width="140" height="30" fill="#b45309" rx="5"/>
  <text x="595" y="181" text-anchor="middle" font-size="9" fill="#fde68a">B3(copy3)</text>

  <!-- Arrows from blocks to racks -->
  <line x1="260" y1="80" x2="308" y2="90" stroke="#475569" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#br)"/>
  <line x1="260" y1="130" x2="308" y2="120" stroke="#475569" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#br)"/>
  <line x1="260" y1="180" x2="308" y2="150" stroke="#475569" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#br)"/>

  <!-- Cross-rack -->
  <line x1="470" y1="100" x2="523" y2="100" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#br)"/>
  <text x="497" y="92" text-anchor="middle" font-size="9" fill="#dc2626">Cross-rack</text>

  <!-- Key insight box -->
  <rect x="10" y="230" width="680" height="110" fill="#e2e8f0" rx="8"/>
  <text x="350" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Rack-Aware Replication Strategy</text>
  <text x="30" y="275" font-size="11" fill="#334155">• Replica 1: Written to local DataNode (same machine as writer)</text>
  <text x="30" y="295" font-size="11" fill="#334155">• Replica 2: Written to a DataNode in a DIFFERENT rack (cross-rack — network fault)</text>
  <text x="30" y="315" font-size="11" fill="#334155">• Replica 3: Written to another DataNode in the SAME rack as Replica 2</text>
  <text x="30" y="332" font-size="11" fill="#7c3aed">✓ This ensures: fast local write + tolerance of one full rack failure + good bandwidth usage</text>
</svg>
