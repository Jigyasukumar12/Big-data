<svg viewBox="0 0 740 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="500" fill="#f8fafc" rx="12"/>
  <text x="370" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">HDFS Read &amp; Write Operations</text>

  <defs>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
  </defs>

  <!-- === WRITE SECTION === -->
  <rect x="10" y="45" width="720" height="210" fill="#eff6ff" rx="10" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="370" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">WRITE OPERATION</text>

  <!-- Client -->
  <rect x="30" y="80" width="80" height="50" fill="#1e40af" rx="6"/>
  <text x="70" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Client</text>

  <!-- Step 1: Client → NameNode -->
  <line x1="110" y1="105" x2="168" y2="105" stroke="#475569" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="139" y="97" text-anchor="middle" font-size="9" fill="#64748b">①create()</text>

  <!-- NameNode -->
  <rect x="170" y="80" width="100" height="50" fill="#7c3aed" rx="6"/>
  <text x="220" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">NameNode</text>
  <text x="220" y="118" text-anchor="middle" font-size="9" fill="#ddd6fe">Metadata store</text>

  <!-- Step 2: NameNode → Client (block locations) -->
  <line x1="270" y1="115" x2="110" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#ar2)" stroke-dasharray="5"/>
  <text x="190" y="138" text-anchor="middle" font-size="9" fill="#64748b">②block locations</text>

  <!-- Step 3: Client writes to DataNode 1 -->
  <line x1="110" y1="145" x2="318" y2="160" stroke="#059669" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="210" y="153" text-anchor="middle" font-size="9" fill="#059669">③ write data (pipeline)</text>

  <!-- DataNode 1 -->
  <rect x="320" y="145" width="85" height="40" fill="#059669" rx="6"/>
  <text x="362" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 1</text>
  <!-- DN1 → DN2 -->
  <line x1="405" y1="165" x2="448" y2="165" stroke="#059669" stroke-width="1.5" marker-end="url(#ar3)"/>
  <!-- DataNode 2 -->
  <rect x="450" y="145" width="85" height="40" fill="#059669" rx="6"/>
  <text x="492" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 2</text>
  <!-- DN2 → DN3 -->
  <line x1="535" y1="165" x2="578" y2="165" stroke="#059669" stroke-width="1.5" marker-end="url(#ar3)"/>
  <!-- DataNode 3 -->
  <rect x="580" y="145" width="85" height="40" fill="#059669" rx="6"/>
  <text x="622" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 3</text>

  <!-- ACKs going back -->
  <line x1="580" y1="185" x2="537" y2="195" stroke="#b45309" stroke-width="1" stroke-dasharray="3" marker-end="url(#ar2)"/>
  <line x1="450" y1="195" x2="407" y2="195" stroke="#b45309" stroke-width="1" stroke-dasharray="3" marker-end="url(#ar2)"/>
  <line x1="320" y1="195" x2="115" y2="190" stroke="#b45309" stroke-width="1" stroke-dasharray="3" marker-end="url(#ar2)"/>
  <text x="500" y="210" text-anchor="middle" font-size="9" fill="#b45309">④ ACK pipeline back to client</text>

  <text x="370" y="242" text-anchor="middle" font-size="9" fill="#475569">Replication factor = 3 (default). Each block is written to 3 DataNodes via pipeline.</text>

  <!-- === READ SECTION === -->
  <rect x="10" y="272" width="720" height="210" fill="#f0fdf4" rx="10" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="370" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">READ OPERATION</text>

  <!-- Client -->
  <rect x="30" y="308" width="80" height="50" fill="#065f46" rx="6"/>
  <text x="70" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Client</text>

  <!-- Client → NameNode (open) -->
  <line x1="110" y1="325" x2="168" y2="325" stroke="#475569" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="139" y="317" text-anchor="middle" font-size="9" fill="#64748b">①open()</text>

  <!-- NameNode -->
  <rect x="170" y="308" width="100" height="50" fill="#7c3aed" rx="6"/>
  <text x="220" y="328" text-anchor="middle" font-size="11" font-weight="bold" fill="white">NameNode</text>
  <text x="220" y="346" text-anchor="middle" font-size="9" fill="#ddd6fe">Returns block list</text>

  <!-- NameNode → Client block locations -->
  <line x1="270" y1="340" x2="110" y2="355" stroke="#475569" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#ar2)"/>
  <text x="188" y="368" text-anchor="middle" font-size="9" fill="#64748b">② block locations &amp; DataNode addresses</text>

  <!-- Client reads from DataNodes -->
  <line x1="110" y1="375" x2="318" y2="388" stroke="#059669" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#ar3)"/>
  <text x="210" y="383" text-anchor="middle" font-size="9" fill="#059669">③ read() from nearest DataNode</text>

  <rect x="320" y="375" width="85" height="40" fill="#059669" rx="6"/>
  <text x="362" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DataNode 1</text>

  <rect x="450" y="375" width="85" height="40" fill="#6b7280" rx="6"/>
  <text x="492" y="390" text-anchor="middle" font-size="10" fill="white">DataNode 2</text>
  <text x="492" y="406" text-anchor="middle" font-size="8" fill="#d1d5db">(replica - fallback)</text>

  <rect x="580" y="375" width="85" height="40" fill="#6b7280" rx="6"/>
  <text x="622" y="390" text-anchor="middle" font-size="10" fill="white">DataNode 3</text>
  <text x="622" y="406" text-anchor="middle" font-size="8" fill="#d1d5db">(replica - fallback)</text>

  <text x="370" y="464" text-anchor="middle" font-size="9" fill="#475569">Client reads from nearest DataNode. If it fails, it automatically switches to the next replica.</text>
</svg>
